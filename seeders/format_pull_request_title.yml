name: Format pull request title

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  pull-requests: write

jobs:
  update-title:
    name: Align pull request title with first commit
    runs-on: ubuntu-latest
    steps:
      - name: Set pull request title
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number: pull_number } = context.issue;

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number, per_page: 100 }
            );

            if (commits.length === 0) {
              core.info('No commits found on the pull request.');
              return;
            }

            const firstCommitMessage = commits[0].commit.message.split('\n')[0];
            const currentTitle = context.payload.pull_request.title;

            if (currentTitle === firstCommitMessage) {
              core.info('Pull request title already matches the first commit message.');
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              title: firstCommitMessage,
            });

            core.info(`Updated pull request title to "${firstCommitMessage}".`);